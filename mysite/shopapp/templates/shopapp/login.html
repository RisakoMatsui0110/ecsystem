{% load static %}
<!DOCTYPE html>
<html>

        <link rel ="stylesheet" href ='{% static "shopapp/css/style.css" %}'>
        <title>会員ログイン</title>
    </head>
    <body>
        <h1>ログインしてください。</h1>

        <a href ="{% url 'shopapp:register_user' %}">会員登録</a>

    </body>
</html>
