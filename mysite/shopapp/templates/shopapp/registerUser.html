{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel ="stylesheet" href ='{% static "shopapp/css/style.css" %}'>
        <title>会員登録</title>
    </head>
    <body>
        <h1>会員情報を入力してください。</h1>
        <form action="{% url 'shopapp:register_user' %}" method='POST'>
            {% csrf_token %}
			<table>
                {{form.as_table}}
                
			</table>
            <input type = "submit" value="登録確認"> <br>
            
            <a href ="{% url 'shopapp:main' %}">商品検索へ</a>
        </form>

    </body>
</html>
